name: Android Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: location_sharing
        run: flutter pub get

      - name: Decode keystore
        working-directory: location_sharing/android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Create keystore.properties
        working-directory: location_sharing/android
        run: |
          cat > keystore.properties <<EOF
          storeFile=../release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=release
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create .env.local
        working-directory: location_sharing
        run: |
          cat > .env.local <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          EOF

      - name: Build release APK
        working-directory: location_sharing
        run: flutter build apk --release

      - name: Build release AAB (Play Store)
        working-directory: location_sharing
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: safe-circle-release-apk
          path: location_sharing/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: safe-circle-release-aab
          path: location_sharing/build/app/outputs/bundle/release/app-release.aab
